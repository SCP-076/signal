name: Build Signal Extension

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:

  # ==========================================
  # LINUX BUILD
  # ==========================================
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-22.04

    steps:
    # 1️⃣ Checkout YOUR extension repository
    - name: Checkout Extension Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2️⃣ Install build dependencies
    - name: Install Build Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-multilib \
          g++-multilib \
          python3 \
          python3-pip \
          git

    # 3️⃣ Install AMBuild
    - name: Install AMBuild
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install git+https://github.com/alliedmodders/ambuild

    # 4️⃣ Checkout Metamod into subfolder (IMPORTANT)
    - name: Checkout Metamod:Source
      uses: actions/checkout@v4
      with:
        repository: alliedmodders/metamod-source
        ref: 1.12-dev
        path: mmsource
        fetch-depth: 0
        submodules: recursive

    # 5️⃣ Checkout SourceMod into subfolder (IMPORTANT)
    - name: Checkout SourceMod
      uses: actions/checkout@v4
      with:
        repository: alliedmodders/sourcemod
        ref: 1.12-dev
        path: sourcemod
        fetch-depth: 0
        submodules: recursive

    # 6️⃣ VERIFY structure (debug safety)
    - name: Verify Directory Structure
      run: |
        echo "=== ROOT ==="
        ls -la
        echo "=== MMSOURCE ==="
        ls -la mmsource
        echo "=== SOURCEMOD ==="
        ls -la sourcemod

    # 7️⃣ Configure and Build
    - name: Configure and Compile
      working-directory: extension
      run: |
        mkdir build
        cd build

        echo "=== Configuring AMBuild ==="
        python3 ../configure.py \
          --enable-optimize \
          --mms-path=../mmsource \
          --sm-path=../sourcemod

        echo "=== Running AMBuild ==="
        ambuild

    # 8️⃣ Upload artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: signal-extension-Linux-x86-x64
        path: extension/build/package/


  # ==========================================
  # WINDOWS BUILD
  # ==========================================
  build-windows:
    name: Build on Windows
    runs-on: windows-2022

    steps:
    - name: Checkout Extension Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install AMBuild
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install git+https://github.com/alliedmodders/ambuild

    - name: Checkout Metamod:Source
      uses: actions/checkout@v4
      with:
        repository: alliedmodders/metamod-source
        ref: 1.12-dev
        path: mmsource
        fetch-depth: 0
        submodules: recursive

    - name: Checkout SourceMod
      uses: actions/checkout@v4
      with:
        repository: alliedmodders/sourcemod
        ref: 1.12-dev
        path: sourcemod
        fetch-depth: 0
        submodules: recursive

    - name: Verify Directory Structure
      shell: pwsh
      run: |
        Write-Host "=== ROOT ==="
        Get-ChildItem
        Write-Host "=== MMSOURCE ==="
        Get-ChildItem mmsource
        Write-Host "=== SOURCEMOD ==="
        Get-ChildItem sourcemod

    - name: Configure and Compile
      working-directory: extension
      shell: pwsh
      run: |
        mkdir build
        cd build

        Write-Host "=== Configuring AMBuild ==="
        python ../configure.py `
          --enable-optimize `
          --mms-path=..\mmsource `
          --sm-path=..\sourcemod

        Write-Host "=== Running AMBuild ==="
        ambuild

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: signal-extension-Windows-x86-x64
        path: extension/build/package/