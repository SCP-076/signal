name: Build Signal Extension

# Execute this workflow on push to main/master branches or manual trigger
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ==========================================
  # LINUX BUILD JOB (Using Ubuntu 20.04 Container)
  # ==========================================
  build-linux:
    name: Build on Linux (Ubuntu 20.04)
    runs-on: ubuntu-latest

    # Run everything inside Ubuntu 20.04 container (for glibc compatibility)
    container:
      image: ubuntu:20.04

    steps:
    # 1. Install required dependencies inside container
    - name: Install Build Dependencies
      run: |
        dpkg --add-architecture i386
        apt-get update
        apt-get install -y \
          git \
          python3 \
          python3-pip \
          gcc-multilib \
          g++-multilib \
          linux-libc-dev:i386

    # 2. Checkout extension source
    - name: Checkout Extension Source
      uses: actions/checkout@v4

    # 3. Install AMBuild
    - name: Install AMBuild
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install git+https://github.com/alliedmodders/ambuild

    # 4. Checkout Metamod:Source
    - name: Checkout Metamod:Source
      uses: actions/checkout@v4
      with:
        repository: alliedmodders/metamod-source
        ref: '1.12-dev'
        path: metamod-source
        submodules: true

    # 5. Checkout SourceMod
    - name: Checkout SourceMod
      uses: actions/checkout@v4
      with:
        repository: alliedmodders/sourcemod
        ref: '1.12-dev'
        path: sourcemod
        submodules: true

    # 6. Configure and Build
    - name: Configure and Compile
      working-directory: extension
      run: |
        mkdir -p build
        cd build

        echo "=== Configuring AMBuild ==="
        # Use RELATIVE paths to avoid container path issues
        python3 ../configure.py \
          --enable-optimize \
          --sm-path=../sourcemod \
          --mms-path=../metamod-source

        echo "=== Running AMBuild ==="
        ambuild

    # 7. Upload artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: signal-extension-Linux-x86-x64
        path: extension/build/package/


  # ==========================================
  # WINDOWS BUILD JOB
  # ==========================================
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
    # 1. Checkout extension source
    - name: Checkout Extension Source
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install AMBuild
    - name: Install AMBuild
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install git+https://github.com/alliedmodders/ambuild

    # 4. Checkout Metamod:Source
    - name: Checkout Metamod:Source
      uses: actions/checkout@v4
      with:
        repository: alliedmodders/metamod-source
        ref: '1.12-dev'
        path: metamod-source
        submodules: true

    # 5. Checkout SourceMod
    - name: Checkout SourceMod
      uses: actions/checkout@v4
      with:
        repository: alliedmodders/sourcemod
        ref: '1.12-dev'
        path: sourcemod
        submodules: true

    # 6. Configure and Build
    - name: Configure and Compile
      working-directory: extension
      run: |
        mkdir build
        cd build

        echo "=== Configuring AMBuild ==="
        python ../configure.py `
          --enable-optimize `
          --sm-path=..\sourcemod `
          --mms-path=..\metamod-source

        echo "=== Running AMBuild ==="
        ambuild

    # 7. Upload artifacts
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: signal-extension-Windows-x86-x64
        path: extension/build/package/